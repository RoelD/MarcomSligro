<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640">
<title>Regionale leverancier op Limburgse boerderij</title>
<defs>
  <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="12" result="noise"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 0.08"/>
    </feComponentTransfer>
    <feBlend mode="multiply" in2="SourceGraphic"/>
  </filter>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#001b12" flood-opacity=".24"/>
  </filter>
  <linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#004f35"/>
    <stop offset="1" stop-color="#00734b"/>
  </linearGradient>
  <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#f8d86a"/>
    <stop offset="1" stop-color="#b8860b"/>
  </linearGradient>
</defs>

<rect width="900" height="640" fill="#e9dfc7"/>
<linearGradient id="sky" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#f7efdc"/><stop offset=".7" stop-color="#d5dfb7"/><stop offset="1" stop-color="#1f5f3d"/></linearGradient>
<rect width="900" height="640" fill="url(#sky)"/>
<path d="M0 450 C210 375 350 420 505 392 C645 366 755 405 900 355 L900 640 L0 640Z" fill="#0b5638"/>
<path d="M80 408 L300 260 L525 415 Z" fill="#b8874b" filter="url(#shadow)"/>
<rect x="140" y="390" width="325" height="145" fill="#7a4f2d"/>
<path d="M72 411 L302 246 L532 411" fill="none" stroke="#e0c360" stroke-width="23"/>
<rect x="260" y="430" width="85" height="105" fill="#3a2419"/>
<rect x="163" y="425" width="64" height="55" fill="#f0d694"/>
<rect x="375" y="425" width="64" height="55" fill="#f0d694"/>
<g transform="translate(585 305)">
  <ellipse cx="85" cy="95" rx="62" ry="73" fill="#c99a6b"/>
  <circle cx="85" cy="45" r="40" fill="#d8aa78"/>
  <path d="M47 40 C80 0 126 22 123 58 C101 39 78 39 47 40Z" fill="#3a2116"/>
  <rect x="35" y="112" width="100" height="145" rx="26" fill="#004f35"/>
  <path d="M55 160 C92 190 114 182 143 153" stroke="#d7bd4a" stroke-width="10" fill="none"/>
</g>
<g filter="url(#grain)"><rect width="900" height="640" fill="transparent"/></g>
</svg>