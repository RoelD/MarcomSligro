<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640">
<title>Proeverij en leveranciersdag in Sligro stijl</title>
<defs>
  <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="12" result="noise"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 0.08"/>
    </feComponentTransfer>
    <feBlend mode="multiply" in2="SourceGraphic"/>
  </filter>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#001b12" flood-opacity=".24"/>
  </filter>
  <linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#004f35"/>
    <stop offset="1" stop-color="#00734b"/>
  </linearGradient>
  <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#f8d86a"/>
    <stop offset="1" stop-color="#b8860b"/>
  </linearGradient>
</defs>

<rect width="900" height="640" fill="#f5f0e6"/>
<rect x="0" y="0" width="900" height="640" fill="#033d2b"/>
<circle cx="760" cy="110" r="170" fill="#d7bd4a" opacity=".16"/>
<g transform="translate(110 120)" filter="url(#shadow)">
  <rect x="0" y="105" width="690" height="310" rx="32" fill="#f7f0df"/>
  <rect x="0" y="105" width="690" height="70" rx="32" fill="#004f35"/>
  <text x="42" y="150" font-family="Arial" font-size="31" font-weight="800" fill="#fff">Lokaal &amp; Lekker proeverij</text>
  <g transform="translate(52 213)">
    <circle cx="72" cy="70" r="55" fill="#d8aa78"/>
    <path d="M29 69 C45 35 100 22 121 65 C103 51 67 55 29 69Z" fill="#2f1d14"/>
    <rect x="20" y="126" width="105" height="96" rx="21" fill="#004f35"/>
  </g>
  <g transform="translate(245 215)">
    <ellipse cx="93" cy="82" rx="120" ry="42" fill="#8c5b33"/>
    <ellipse cx="93" cy="68" rx="113" ry="36" fill="#bf8550"/>
    <circle cx="45" cy="59" r="18" fill="#e4bb45"/><circle cx="92" cy="48" r="19" fill="#f0d8a0"/><circle cx="138" cy="64" r="18" fill="#9b3325"/>
    <rect x="2" y="136" width="184" height="44" rx="22" fill="#d7bd4a"/>
    <text x="94" y="164" text-anchor="middle" font-family="Arial" font-weight="700" fill="#004f35">Proefpakket</text>
  </g>
  <g transform="translate(520 210)">
    <rect width="92" height="190" rx="22" fill="#004f35"/>
    <rect x="18" y="22" width="56" height="100" rx="12" fill="#e8dbba"/>
    <path d="M28 60 C50 42 64 70 44 92" stroke="#b68f24" stroke-width="8" fill="none"/>
    <text x="46" y="155" text-anchor="middle" font-family="Arial" font-size="15" fill="#fff">ZiN</text>
  </g>
</g>
<g filter="url(#grain)"><rect width="900" height="640" fill="transparent"/></g>
</svg>