<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640">
<title>Betrouwbare bezorging met lokaal herkomstkaartje</title>
<defs>
  <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="12" result="noise"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 0.08"/>
    </feComponentTransfer>
    <feBlend mode="multiply" in2="SourceGraphic"/>
  </filter>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#001b12" flood-opacity=".24"/>
  </filter>
  <linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#004f35"/>
    <stop offset="1" stop-color="#00734b"/>
  </linearGradient>
  <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#f8d86a"/>
    <stop offset="1" stop-color="#b8860b"/>
  </linearGradient>
</defs>

<rect width="900" height="640" fill="#f5f0e6"/>
<linearGradient id="bg" x1="0" x2="1"><stop offset="0" stop-color="#f5f0e6"/><stop offset="1" stop-color="#dfe9d6"/></linearGradient>
<rect width="900" height="640" fill="url(#bg)"/>
<path d="M0 470 H900 V640 H0Z" fill="#004f35"/>
<g transform="translate(120 245)" filter="url(#shadow)">
  <rect x="0" y="80" width="470" height="150" rx="20" fill="#ffffff"/>
  <rect x="40" y="26" width="260" height="92" rx="16" fill="#004f35"/>
  <text x="78" y="84" font-family="Georgia" font-size="43" font-weight="800" fill="#fff">Sligro</text>
  <path d="M470 115 H590 L670 180 V230 H470Z" fill="#f7f3e9"/>
  <path d="M518 130 H587 L635 174 H518Z" fill="#bee0ed"/>
  <circle cx="165" cy="235" r="54" fill="#222"/><circle cx="165" cy="235" r="27" fill="#d7bd4a"/>
  <circle cx="546" cy="235" r="54" fill="#222"/><circle cx="546" cy="235" r="27" fill="#d7bd4a"/>
</g>
<g transform="translate(623 130)" filter="url(#shadow)">
  <rect width="175" height="230" rx="24" fill="#fff"/>
  <rect x="22" y="28" width="132" height="85" rx="16" fill="#d7bd4a"/>
  <path d="M50 68 C72 48 102 48 124 68" stroke="#004f35" stroke-width="8" fill="none"/>
  <text x="88" y="154" text-anchor="middle" font-family="Arial" font-size="20" font-weight="800" fill="#004f35">Herkomst</text>
  <text x="88" y="184" text-anchor="middle" font-family="Arial" font-size="15" fill="#555">Scan het verhaal</text>
</g>
<g filter="url(#grain)"><rect width="900" height="640" fill="transparent"/></g>
</svg>