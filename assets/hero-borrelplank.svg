<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
<title id="title">Limburgse borrelplank met streekproducten</title>
<desc id="desc">Hyperrealistische vectorillustratie van lokale producten op een houten tafel.</desc>

<defs>
  <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="12" result="noise"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 0.08"/>
    </feComponentTransfer>
    <feBlend mode="multiply" in2="SourceGraphic"/>
  </filter>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#001b12" flood-opacity=".24"/>
  </filter>
  <linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#004f35"/>
    <stop offset="1" stop-color="#00734b"/>
  </linearGradient>
  <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#f8d86a"/>
    <stop offset="1" stop-color="#b8860b"/>
  </linearGradient>
</defs>

<rect width="1440" height="900" fill="#f5f0e6"/>
<radialGradient id="sun" cx=".18" cy=".12" r=".75"><stop offset="0" stop-color="#fff7d8"/><stop offset=".55" stop-color="#eedebc"/><stop offset="1" stop-color="#174936"/></radialGradient>
<rect width="1440" height="900" fill="url(#sun)"/>
<path d="M0 610 C220 500 410 530 600 570 C850 630 1020 520 1440 570 L1440 900 L0 900 Z" fill="#0a5a3d"/>
<path d="M0 630 C230 540 410 565 610 600 C870 650 1050 555 1440 600" fill="none" stroke="#d7bd4a" stroke-width="5" opacity=".55"/>
<g filter="url(#shadow)" transform="translate(210 210)">
  <ellipse cx="520" cy="395" rx="470" ry="205" fill="#7a4d2a"/>
  <ellipse cx="520" cy="374" rx="455" ry="192" fill="#a66b38"/>
  <path d="M75 360 C240 310 430 300 595 330 C760 360 870 330 965 365 C850 480 610 555 345 510 C195 485 95 435 75 360Z" fill="#d8a46c" opacity=".45"/>
  <g>
    <circle cx="330" cy="355" r="105" fill="#f4e0a6"/>
    <circle cx="330" cy="355" r="82" fill="#f8ecbf"/>
    <path d="M275 325 C306 298 365 299 388 338 C378 388 295 392 268 357Z" fill="#d9aa33"/>
    <path d="M278 340 C320 350 348 322 384 345" stroke="#ad7a22" stroke-width="8" fill="none" opacity=".55"/>
  </g>
  <g transform="translate(500 260)">
    <ellipse cx="130" cy="120" rx="120" ry="55" fill="#641f15"/>
    <ellipse cx="130" cy="98" rx="118" ry="53" fill="#8e2e1f"/>
    <circle cx="68" cy="83" r="14" fill="#f7d889"/>
    <circle cx="132" cy="68" r="13" fill="#f7d889"/>
    <circle cx="190" cy="93" r="15" fill="#f7d889"/>
    <path d="M30 112 C90 145 180 145 230 110" stroke="#4c160f" stroke-width="7" fill="none" opacity=".45"/>
  </g>
  <g transform="translate(715 275)">
    <path d="M40 50 C120 10 230 30 270 95 C225 150 105 165 30 110Z" fill="#f1d379"/>
    <path d="M70 70 C128 42 202 55 238 94" stroke="#c69b29" stroke-width="8" fill="none"/>
    <circle cx="115" cy="86" r="7" fill="#926b17"/><circle cx="185" cy="100" r="8" fill="#926b17"/>
  </g>
  <g transform="translate(200 465)">
    <path d="M0 0 C70 -40 150 -30 195 15 C155 80 55 95 -5 38Z" fill="#1f733c"/>
    <path d="M36 12 C75 -5 127 -4 167 20" stroke="#b9c957" stroke-width="7" fill="none"/>
    <ellipse cx="34" cy="23" rx="20" ry="13" fill="#c73126"/>
    <ellipse cx="92" cy="2" rx="22" ry="14" fill="#d64831"/>
    <ellipse cx="145" cy="28" rx="24" ry="15" fill="#b82a23"/>
  </g>
  <g transform="translate(680 450)">
    <rect x="0" y="0" width="220" height="72" rx="18" fill="#efe4cd"/>
    <text x="110" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#004f35">Lokaal Limburg</text>
  </g>
</g>
<g transform="translate(75 80)">
  <rect width="285" height="94" rx="24" fill="url(#green)" filter="url(#shadow)"/>
  <text x="34" y="56" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#fff">Sligro</text>
  <path d="M175 67 H250" stroke="#d7bd4a" stroke-width="8" stroke-linecap="round"/>
</g>
</svg>